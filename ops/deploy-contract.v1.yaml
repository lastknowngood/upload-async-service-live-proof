contract_version: v1

lifecycle:
  # Contract class: `live` means this repo is eligible for a real Coolify proof/deploy.
  # It does not by itself say whether a runtime is currently retained.
  mode: live

project:
  name: upload-async-service-live-proof
  owner: lastknowngood
  repository_url: https://github.com/lastknowngood/upload-async-service-live-proof

target:
  platform_class: coolify-single-host-v1
  host_label: coolify-01
  environment: production

exposure:
  mode: public
  domains:
    - upload.dental-school.education

coolify:
  app_type: dockerfile
  resource_name: upload-async-service-live-proof
  project_name: live-proof-tests

build:
  source_type: git
  source_ref: proof/upload-async-service-live-proof-private-20260331-r3
  runtime_notes: single FastAPI app with embedded DB-polling worker; PostgreSQL is durable source of truth; Hetzner Object Storage stores derived artifacts only.

state:
  stateful: true
  data_paths: []
  storage_class: postgres-primary-plus-derived-object-artifacts

dependencies:
  database: postgresql
  cache: none
  object_storage: s3-compatible-object-storage

secrets:
  source_of_truth: external-secret-store
  required_secret_names:
    - DATABASE_URL
    - OBJECT_STORAGE_ENDPOINT
    - OBJECT_STORAGE_BUCKET
    - OBJECT_STORAGE_ACCESS_KEY_ID
    - OBJECT_STORAGE_SECRET_ACCESS_KEY

operations:
  healthcheck: GET /healthz
  rollback_hint: same-day fail-closed proof path; if the private round, proof-fence, or public HTTPS redeploy goes red, remove the A record, clean up app and DB resources, delete the object prefix, revoke the fresh S3 credential, and return to the retained empty Object Storage boundary.
  backup_class: stateful-logical-dump

notes:
  - lifecycle.mode live is the contract/proof class; current retained runtime state is documented separately in README.md and this notes list.
  - PostgreSQL is the durable source of truth for uploads and job state.
  - Object Storage is used only for rematerializable derived JSON artifacts.
  - Proof-only endpoints stay allowed only in the private phase and must be fenced before any public proof.
  - Current steady state is: successful private plus short public proof on `proof/upload-async-service-live-proof-private-20260331-r3`, then same-day cleanup; retained are only the dedicated Hetzner Object Storage project and the empty bucket, with no active app key, no host resources and no DNS.
  - On this Hetzner Object Storage setup, generated S3 credentials are project-wide per Object Storage project; app-runtime isolation therefore uses a dedicated project instead of the shared `Backups` project.
  - Any later private host round must mint a fresh demo key and prove full isolation with that exact key in the same block before app wiring or live use starts.
  - The first private host round proved exact import plus partial A/B flow on `r1`, then exposed a real store bug that is fixed in `abff105c4cb0743e9d758a6812d63c8490233a22`.
  - The later retry input `proof/upload-async-service-live-proof-private-20260331-r3` is intentionally pinned directly to `abff105c4cb0743e9d758a6812d63c8490233a22` and is the first ref that completed the full private proof, proof-fence and short public proof on this host.
