contract_version: v1

lifecycle:
  mode: live

project:
  name: upload-async-service-live-proof
  owner: lastknowngood
  repository_url: https://github.com/lastknowngood/upload-async-service-live-proof

target:
  platform_class: coolify-single-host-v1
  host_label: coolify-01
  environment: production

exposure:
  mode: private
  domains:
    - upload.dental-school.education

coolify:
  app_type: dockerfile
  resource_name: upload-async-service-live-proof
  project_name: live-proof-tests

build:
  source_type: git
  source_ref: proof/upload-async-service-live-proof-private-20260330-r1
  runtime_notes: single FastAPI app with embedded DB-polling worker; PostgreSQL is durable source of truth; Hetzner Object Storage stores derived artifacts only.

state:
  stateful: true
  data_paths: []
  storage_class: postgres-primary-plus-derived-object-artifacts

dependencies:
  database: postgresql
  cache: none
  object_storage: s3-compatible-object-storage

secrets:
  source_of_truth: external-secret-store
  required_secret_names:
    - DATABASE_URL
    - OBJECT_STORAGE_ENDPOINT
    - OBJECT_STORAGE_BUCKET
    - OBJECT_STORAGE_ACCESS_KEY_ID
    - OBJECT_STORAGE_SECRET_ACCESS_KEY

operations:
  healthcheck: GET /healthz
  rollback_hint: private-only fail-closed round; if private readiness, backup/restore, or restore-cutover proof goes red, keep DNS untouched, clean up app and DB resources, remove the object prefix, revoke the fresh S3 credential, and return to the retained empty Object Storage boundary.
  backup_class: stateful-logical-dump

notes:
  - PostgreSQL is the durable source of truth for uploads and job state.
  - Object Storage is used only for rematerializable derived JSON artifacts.
  - Proof-only endpoints stay allowed in this private-only block and must be fenced before any later public proof.
  - Current steady state is a private-only proof contract plus a published proof ref, a dedicated Hetzner Object Storage project retained, and an empty dedicated bucket retained; no host resources, no active app Object Storage credential, no DNS and no live proof evidence are active from this contract.
  - On this Hetzner Object Storage setup, generated S3 credentials are project-wide per Object Storage project; app-runtime isolation therefore uses a dedicated project instead of the shared `Backups` project.
  - Any later private host round must mint a fresh demo key and prove full isolation with that exact key in the same block before app wiring or live use starts.
