services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: upload_async_service_live_proof
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d upload_async_service_live_proof']
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - '54329:5432'
  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
